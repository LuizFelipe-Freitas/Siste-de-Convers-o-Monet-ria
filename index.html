<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas - Fintech</title>
    <style>
        /* Paleta de cores moderna e tipografia */
        :root {
            --bg-color: #0f172a; /* Fundo escuro elegante */
            --card-bg: #ffffff;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        /* Container Principal */
        .converter-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.5rem;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Inputs e Selects */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #f8fafc;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .input-group {
            flex: 1;
        }

        /* Botão */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        /* Box de Resultado */
        .result {
            margin-top: 25px;
            text-align: center;
            padding: 20px;
            background-color: #f1f5f9;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result .amount {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result .converted {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <div class="header">
            <h2>Conversão Cambial</h2>
            <p>Cotações processadas em tempo real via API</p>
        </div>

        <div class="input-group">
            <label for="valor">Valor a Converter</label>
            <input type="number" id="valor" placeholder="Ex: 100.00" min="0" step="0.01">
        </div>

        <div class="row">
            <div class="input-group">
                <label for="origem">De (Origem)</label>
                <select id="origem"></select>
            </div>
            <div class="input-group">
                <label for="destino">Para (Destino)</label>
                <select id="destino"></select>
            </div>
        </div>

        <button onclick="converterMoeda()" id="btn-converter">Processar Conversão</button>

        <div class="result" id="resultado">
            <span style="color: #94a3b8; font-size: 0.95rem;">O resultado aparecerá aqui</span>
        </div>
    </div>

    <script>
        // Mapeamento dos elementos da interface
        const originSelect = document.getElementById('origem');
        const targetSelect = document.getElementById('destino');
        const amountInput = document.getElementById('valor');
        const resultDiv = document.getElementById('resultado');
        const btnConverter = document.getElementById('btn-converter');

        // Moedas corporativas comumente usadas no cenário de Fintech
        const moedasDisponiveis = {
            "USD": "Dólar Americano",
            "BRL": "Real Brasileiro",
            "EUR": "Euro",
            "GBP": "Libra Esterlina",
            "JPY": "Iene Japonês",
            "AUD": "Dólar Australiano",
            "CAD": "Dólar Canadense"
        };

        // Função que insere as moedas no menu Dropdown quando a tela carrega
        function inicializarInterface() {
            for (const [codigo, nome] of Object.entries(moedasDisponiveis)) {
                const text = `${codigo} - ${nome}`;
                originSelect.add(new Option(text, codigo));
                targetSelect.add(new Option(text, codigo));
            }
            // Deixa USD -> BRL pré-selecionado como padrão
            originSelect.value = "USD";
            targetSelect.value = "BRL";
        }

        // Função central para consumo da API e renderização
        async function converterMoeda() {
            const amount = parseFloat(amountInput.value);
            const from = originSelect.value;
            const to = targetSelect.value;

            // Validação de segurança básica na interface
            if (isNaN(amount) || amount <= 0) {
                resultDiv.innerHTML = '<span style="color: #ef4444; font-weight: 600;">⚠️ Por favor, insira um valor válido.</span>';
                return;
            }

            // Atualiza o estado visual para carregamento
            btnConverter.disabled = true;
            btnConverter.innerText = "Consultando API...";

            try {
                // Requisição assíncrona HTTP
                const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
                const data = await response.json();
                
                // Cálculo de conversão
                const rate = data.rates[to];
                const finalValue = (amount * rate).toFixed(2);

                // Formatação monetária limpa para o usuário final
                resultDiv.innerHTML = `
                    <div class="amount">${amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})} ${from} equivale a</div>
                    <div class="converted">${parseFloat(finalValue).toLocaleString('pt-BR', {minimumFractionDigits: 2})} ${to}</div>
                `;
            } catch (error) {
                // Tratamento de falha conforme vimos nos requisitos de QA
                resultDiv.innerHTML = '<span style="color: #ef4444; font-weight: 600;">Falha de integração. Tente novamente mais tarde.</span>';
            } finally {
                // Restaura o estado original do botão
                btnConverter.disabled = false;
                btnConverter.innerText = "Processar Conversão";
            }
        }

        // Ouve o Enter no teclado para disparar a conversão também
        amountInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                converterMoeda();
            }
        });

        // Executa a carga das opções na primeira vez
        window.onload = inicializarInterface;
    </script>
</body>
</html>
